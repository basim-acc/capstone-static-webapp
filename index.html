<!DOCTYPE html>
<html>
<head>
    <title>Feedback Portal</title>
</head>
<body>

    <h2>Upload Document</h2>
    <input type="file" id="fileInput" />
    <button onclick="uploadFile()">Upload Document</button>

    <hr>

    <h2>Submit Feedback</h2>
    <input id="name" placeholder="Your Name" />
    <input id="feedback" placeholder="Your Feedback" />
    <button onclick="submitFeedback()">Submit</button>

    <h3>Feedback List</h3>
    <ul id="list"></ul>

<script>
const API_BASE = "https://capstone-basim-fa-hphmfbbpfvgwdza3.canadacentral-01.azurewebsites.net/api/feedback";
const API_UPLOAD = "https://capstone-basim-fa-hphmfbbpfvgwdza3.canadacentral-01.azurewebsites.net/api/upload"

// Upload file
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const text = await file.text();

    await fetch(API_UPLOAD, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: text
    });

    alert("File uploaded successfully");
    loadFeedback(); // optional refresh
}

// Submit feedback
async function submitFeedback() {
    const name = document.getElementById("name").value;
    const feedback = document.getElementById("feedback").value;

    if (!name || !feedback) {
        alert("Please fill all fields");
        return;
    }

    await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, feedback })
    });

    document.getElementById("name").value = "";
    document.getElementById("feedback").value = "";

    loadFeedback();
}

// Load feedback list
async function loadFeedback() {
    const res = await fetch(API_BASE);
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {
        const li = document.createElement("li");
        li.innerText = item.name + ": " + item.feedback;
        list.appendChild(li);
    });
}

// Initial load
loadFeedback();
</script>

</body>
</html>
